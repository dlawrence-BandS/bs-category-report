<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B&amp;S | Item Category Report</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root{
    --ink:#22303c; --ink-soft:#5a6b7a; --paper:#f2f0eb; --card:#ffffff;
    --head:#1f3d33; --head-2:#2a5244; --line:#e3ded4; --accent:#b97742;
    --up:#1e7d4f; --down:#c0392b; --chip:#eef2ef;
    --f-data:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    --f-disp:Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--f-data);font-size:13px}
  header{background:var(--head);color:#fff;padding:14px 22px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  header h1{font-family:var(--f-disp);font-weight:400;font-size:20px;letter-spacing:.3px}
  header .brand{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;opacity:.85;border-right:1px solid rgba(255,255,255,.3);padding-right:14px}
  header .meta{margin-left:auto;font-size:11px;opacity:.75}
  nav{background:#fff;border-bottom:1px solid var(--line);padding:0 12px;display:flex;overflow-x:auto;position:sticky;top:0;z-index:20}
  nav button{background:none;border:none;border-bottom:3px solid transparent;padding:12px 14px;font:600 12.5px var(--f-data);color:var(--ink-soft);cursor:pointer;white-space:nowrap}
  nav button:hover{color:var(--ink)}
  nav button.on{color:var(--head);border-bottom-color:var(--accent)}
  main{max-width:1240px;margin:0 auto;padding:18px 16px 60px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:10px 12px}
  .kpi .l{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft)}
  .kpi .v{font-family:var(--f-disp);font-size:23px;margin:2px 0}
  .kpi .d{font-size:11px;font-weight:600}
  .up{color:var(--up)} .down{color:var(--down)} .flat{color:var(--ink-soft)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:6px;margin-bottom:16px;overflow:hidden}
  .card h2{background:var(--head-2);color:#fff;font:600 12.5px var(--f-data);letter-spacing:.4px;padding:9px 14px;display:flex;align-items:center;gap:10px}
  .card h2 .sub{font-weight:400;opacity:.75;font-size:11px}
  .card .body{padding:12px 14px}
  .chartbox{position:relative;height:320px}
  .chartbox.tall{height:380px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th{text-align:right;padding:7px 8px;border-bottom:2px solid var(--line);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);cursor:pointer;user-select:none;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  th.sorton{color:var(--head)}
  td{padding:6px 8px;border-bottom:1px solid #f0ede6;text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  td.name{max-width:320px;overflow:hidden;text-overflow:ellipsis;font-weight:500}
  tr:hover td{background:#faf8f3}
  tr.total td{font-weight:700;border-top:2px solid var(--line)}
  .delta{font-size:10.5px;font-weight:600;margin-left:5px}
  .controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .controls label{font-size:11px;color:var(--ink-soft);font-weight:600}
  select,input[type=search]{border:1px solid var(--line);border-radius:5px;padding:7px 9px;font:12.5px var(--f-data);background:#fff;color:var(--ink)}
  input[type=search]{min-width:230px}
  .btn{border:1px solid var(--line);background:#fff;border-radius:5px;padding:7px 12px;font:600 12px var(--f-data);cursor:pointer;color:var(--ink)}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .pager{display:flex;gap:8px;align-items:center;justify-content:flex-end;padding:10px 14px;font-size:11.5px;color:var(--ink-soft)}
  .note{font-size:11px;color:var(--ink-soft);padding:8px 14px;border-top:1px solid #f0ede6}
  .tabpage{display:none}.tabpage.on{display:block}
  .loading{padding:60px;text-align:center;color:var(--ink-soft);font-family:var(--f-disp);font-size:16px}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:900px){.twocol{grid-template-columns:1fr}}
  /* --- auth gate + range bar (added for live/OAuth build) --- */
  #gate{display:none;min-height:100vh;align-items:center;justify-content:center;background:var(--head)}
  .gatecard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:34px 40px;max-width:420px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.25)}
  .gatecard .brandbig{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
  .gatecard h1{font-family:var(--f-disp);font-weight:400;font-size:26px;color:var(--head);margin-bottom:10px}
  .gatesub{font-size:12.5px;color:var(--ink-soft);margin-bottom:20px;line-height:1.5}
  .gbtn{background:var(--head-2);color:#fff;border:none;border-radius:6px;padding:11px 20px;font:600 13px var(--f-data);cursor:pointer;letter-spacing:.3px}
  .gbtn:hover{background:var(--head)}
  .gatemsg{font-size:11.5px;color:var(--down);margin-top:16px;min-height:14px;line-height:1.5}
  .rangebar{background:#fff;border-bottom:1px solid var(--line);padding:9px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .rangebar label{font-size:11px;color:var(--ink-soft);font-weight:600}
  .rangebar .dash{color:var(--ink-soft)}
  .rangebar .spacer{flex:1}
  .rangebar .customwrap{display:flex;align-items:center;gap:6px}
  input[type=date]{border:1px solid var(--line);border-radius:5px;padding:6px 8px;font:12.5px var(--f-data);background:#fff;color:var(--ink)}
</style>
</head>
<body>
<div id="gate">
  <div class="gatecard">
    <div class="brandbig">Barker &amp; Stonehouse</div>
    <h1>Item Category Report</h1>
    <p class="gatesub">Sign in with your Barker &amp; Stonehouse Google account to view live data.</p>
    <button id="signinBtn" class="gbtn">Sign in with Google</button>
    <p id="gateMsg" class="gatemsg"></p>
  </div>
</div>
<div id="app" style="display:none">
  <header>
    <span class="brand">Barker and Stonehouse</span>
    <h1>Item Category Report</h1>
    <span class="meta" id="metaLine">…</span>
  </header>
  <div class="rangebar">
    <label>Period</label>
    <select id="preset">
      <option value="w1">Last full week</option>
      <option value="w4">Last 4 weeks</option>
      <option value="w13">Last 13 weeks</option>
      <option value="w26">Last 26 weeks</option>
      <option value="custom">Custom…</option>
    </select>
    <span id="customWrap" class="customwrap">
      <input type="date" id="fromD"> <span class="dash">→</span> <input type="date" id="toD">
      <button class="btn" id="applyBtn">Apply</button>
    </span>
    <button class="btn" id="refreshBtn" title="Re-query the current period from BigQuery">↻ Refresh</button>
    <span class="spacer"></span>
    <button class="btn" id="signoutBtn">Sign out</button>
  </div>
  <nav id="nav"></nav>
  <main id="main"></main>
</div>

<script>
"use strict";
/* ============================== helpers ============================== */
const gbp = v => "£" + Math.round(v).toLocaleString("en-GB");
const num = v => Math.round(v).toLocaleString("en-GB");
const pct = v => (v*100).toFixed(2) + "%";
const dl = (cur, prev, invert) => {
  if (!prev) return `<span class="delta flat">–</span>`;
  const d = (cur - prev) / prev;
  const cls = Math.abs(d) < 0.0005 ? "flat" : ((d > 0) !== !!invert ? "up" : "down");
  const arrow = d > 0 ? "▲" : d < 0 ? "▼" : "";
  return `<span class="delta ${cls}">${arrow} ${(Math.abs(d)*100).toFixed(1)}%</span>`;
};
const PAL = ["#d6336c","#2f9e9a","#5c7cfa","#e8890c","#7048a8","#94ad24","#c0392b","#3d6b96",
             "#b97742","#4d8a5f","#c26fa8","#6b7280","#1f7a8c","#a05c2c","#556b2f","#8b5e83"];
const col = i => PAL[i % PAL.length];
const heat = (v, max, hue) => max > 0 && v > 0 ? `background:hsla(${hue},55%,50%,${0.08 + 0.5*Math.min(1, v/max)})` : "";
Chart.defaults.font.family = getComputedStyle(document.documentElement).getPropertyValue("--f-data");
Chart.defaults.font.size = 11;
Chart.defaults.color = "#5a6b7a";
const charts = {};
function draw(id, cfg){
  if (charts[id]) charts[id].destroy();
  const el = document.getElementById(id);
  if (el) charts[id] = new Chart(el, cfg);
}
const sum = (arr, f) => arr.reduce((a, x) => a + (f(x) || 0), 0);
const groupBy = (arr, f) => arr.reduce((m, x) => ((m[f(x)] = m[f(x)] || []).push(x), m), {});
const shortDate = s => { const d = new Date(s + "T00:00:00"); return d.toLocaleDateString("en-GB", {day:"numeric", month:"short"}); };
const monthLbl = s => new Date(s + "T00:00:00").toLocaleDateString("en-GB", {month:"short", year:"2-digit"});

/* ============================== config ============================== */
const CLIENT_ID = "46227372300-rk63ag0caqgd7n12gjd0nt7f2qi7llqr.apps.googleusercontent.com";
const ALLOWED_DOMAIN = "barkerandstonehouse.co.uk";
const PROJECT = "commanding-air-450109-p0";
const DATASET = "analytics_287404213";
const LOCATION = "europe-west2";
const SCOPES = "openid email https://www.googleapis.com/auth/bigquery.readonly";
const FOCUS = {
  garden:        {label:"Garden",        field:"item_category",  value:"GARDEN"},
  sofas:         {label:"Sofas",         field:"item_category2", value:"SOFAS"},
  dining_tables: {label:"Dining Tables", field:"item_category2", value:"DINING TABLES"},
  dining_chairs: {label:"Dining Chairs", field:"item_category2", value:"DINING CHAIRS"},
  mattresses:    {label:"Mattresses",    field:"item_category2", value:"MATTRESSES"},
};
const FOCUS_LABELS = Object.fromEntries(Object.entries(FOCUS).map(([k, v]) => [k, v.label]));
const TREND_WEEKS = 65;    // weekly trend-series window
const FOCUS_WEEKS = 112;   // daily-focus window (covers 56-wk display + 364d YoY overlay)
const MONTHLY_DAYS = 730;  // seasonal monthly-mix window (~2y)

/* ============================== date helpers ============================== */
const parseD = s => { const [y, m, d] = s.split("-").map(Number); return new Date(Date.UTC(y, m-1, d)); };
const fmtD = dt => dt.toISOString().slice(0, 10);
const addD = (s, n) => { const dt = parseD(s); dt.setUTCDate(dt.getUTCDate() + n); return fmtD(dt); };
const sfx = s => s.replace(/-/g, "");
const minD = (a, b) => a < b ? a : b;
const todayStr = () => fmtD(new Date());
const mondayStr = s => { const dt = parseD(s); const wd = (dt.getUTCDay() + 6) % 7; dt.setUTCDate(dt.getUTCDate() - wd); return fmtD(dt); };
function weeksBetween(a, b){ let m = mondayStr(a); const out = []; while (m <= b) { out.push(m); m = addD(m, 7); } return out; }
function lastFullWeek(){ const mon = mondayStr(todayStr()); return {from: addD(mon, -7), to: addD(mon, -1)}; }
function lastNWeeks(n){ const mon = mondayStr(todayStr()); return {from: addD(mon, -7*n), to: addD(mon, -1)}; }

/* ============================== auth (GIS token client + BigQuery readonly) ============================== */
let tokenClient = null, accessToken = null, tokenExp = 0, tokenInFlight = null, signedInEmail = null;
function initTokenClient(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES, hd: ALLOWED_DOMAIN, callback: () => {},
  });
}
function requestToken(prompt){
  return new Promise((resolve, reject) => {
    tokenClient.callback = resp => {
      if (resp.error) return reject(new Error(resp.error));
      accessToken = resp.access_token;
      tokenExp = Date.now() + ((resp.expires_in ? resp.expires_in * 1000 : 3600000) - 60000);
      resolve(accessToken);
    };
    tokenClient.error_callback = err => reject(err instanceof Error ? err : new Error((err && err.type) || "sign-in error"));
    tokenClient.requestAccessToken({prompt: prompt || ""});
  });
}
async function getToken(){                                   // silent refresh, coalesced
  if (accessToken && Date.now() < tokenExp) return accessToken;
  if (tokenInFlight) return tokenInFlight;
  tokenInFlight = requestToken("").finally(() => { tokenInFlight = null; });
  return tokenInFlight;
}
async function fetchEmail(){
  const t = await getToken();
  const r = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {headers:{Authorization: "Bearer " + t}});
  if (!r.ok) return null;
  return (await r.json()).email;
}
function showGate(msg){
  document.getElementById("app").style.display = "none";
  document.getElementById("gate").style.display = "flex";
  document.getElementById("gateMsg").textContent = msg || "";
}
function showApp(){
  document.getElementById("gate").style.display = "none";
  document.getElementById("app").style.display = "block";
}
async function signIn(){
  try {
    await requestToken("consent");
    const email = await fetchEmail();
    if (!email || !email.toLowerCase().endsWith("@" + ALLOWED_DOMAIN)) {
      accessToken = null; tokenExp = 0;
      return showGate("Restricted to Barker & Stonehouse Google accounts. You signed in as " + (email || "an unknown account") + ".");
    }
    signedInEmail = email;
    showApp();
    buildApp();
  } catch (e) {
    showGate("Sign-in was cancelled or failed. " + (e.message || ""));
  }
}
function signOut(){ accessToken = null; tokenExp = 0; signedInEmail = null; location.reload(); }
function initAuth(){
  const start = () => { initTokenClient(); document.getElementById("signinBtn").onclick = signIn; showGate(""); };
  if (window.google && google.accounts && google.accounts.oauth2) start();
  else { const iv = setInterval(() => { if (window.google && google.accounts && google.accounts.oauth2) { clearInterval(iv); start(); } }, 150); }
}

/* ============================== BigQuery REST ============================== */
async function bq(sql){
  const base = "https://bigquery.googleapis.com/bigquery/v2/projects/" + PROJECT;
  const token = await getToken();
  const auth = {Authorization: "Bearer " + token};
  let res = await fetch(base + "/queries", {
    method: "POST", headers: {...auth, "Content-Type": "application/json"},
    body: JSON.stringify({query: sql, useLegacySql: false, location: LOCATION, timeoutMs: 30000, maxResults: 20000}),
  });
  if (!res.ok) throw new Error("BigQuery " + res.status + ": " + (await res.text()).slice(0, 300));
  let data = await res.json();
  const jobId = data.jobReference.jobId;
  while (!data.jobComplete) {                                 // poll long-running jobs
    await new Promise(r => setTimeout(r, 700));
    const g = await fetch(base + "/queries/" + jobId + "?location=" + LOCATION + "&maxResults=20000&timeoutMs=30000", {headers: auth});
    if (!g.ok) throw new Error("BigQuery " + g.status + ": " + (await g.text()).slice(0, 300));
    data = await g.json();
  }
  const schema = data.schema.fields;
  let rows = data.rows || [];
  let pageToken = data.pageToken;
  while (pageToken) {                                          // page through large results
    const g = await fetch(base + "/queries/" + jobId + "?location=" + LOCATION + "&maxResults=20000&pageToken=" + pageToken, {headers: auth});
    const pg = await g.json();
    rows = rows.concat(pg.rows || []);
    pageToken = pg.pageToken;
  }
  const numeric = new Set(["INTEGER","INT64","FLOAT","FLOAT64","NUMERIC","BIGNUMERIC"]);
  return rows.map(r => {
    const o = {};
    schema.forEach((f, i) => { let v = r.f[i].v; if (v !== null && numeric.has(f.type)) v = Number(v); o[f.name] = v; });
    return o;
  });
}

/* ============================== SQL builders (ported from refresh_data.py) ============================== */
const TBL = "`" + PROJECT + "." + DATASET + ".events_*`";
const SID = "CONCAT(user_pseudo_id, '-', CAST((SELECT value.int_value FROM UNNEST(event_params) WHERE key = 'ga_session_id') AS STRING))";
function focusCase(){
  return "CASE " + Object.entries(FOCUS).map(([k, f]) =>
    "WHEN UPPER(TRIM(i." + f.field + ")) = '" + f.value + "' THEN '" + k + "'").join(" ") + " ELSE NULL END";
}
function sqlWeekly(dim, a, b){ return `
WITH v AS (
  SELECT DATE_TRUNC(PARSE_DATE('%Y%m%d', event_date), WEEK(MONDAY)) AS wk,
    IFNULL(NULLIF(TRIM(i.${dim}), ''), '(not set)') AS cat, ${SID} AS sid, i.item_name AS nm
  FROM ${TBL}, UNNEST(items) AS i
  WHERE event_name = 'view_item' AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}'),
p AS (
  SELECT DATE_TRUNC(PARSE_DATE('%Y%m%d', event_date), WEEK(MONDAY)) AS wk,
    IFNULL(NULLIF(TRIM(i.${dim}), ''), '(not set)') AS cat,
    ecommerce.transaction_id AS tid, IFNULL(i.quantity, 1) AS q, IFNULL(i.item_revenue, 0) AS rev
  FROM ${TBL}, UNNEST(items) AS i
  WHERE event_name = 'purchase' AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}'),
va AS (SELECT wk, cat, COUNT(DISTINCT sid) AS s, COUNT(DISTINCT nm) AS iv FROM v GROUP BY wk, cat),
pa AS (SELECT wk, cat, COUNT(DISTINCT tid) AS t, SUM(q) AS ip, ROUND(SUM(rev), 2) AS r FROM p GROUP BY wk, cat)
SELECT FORMAT_DATE('%Y-%m-%d', COALESCE(va.wk, pa.wk)) AS w, COALESCE(va.cat, pa.cat) AS c,
  IFNULL(va.s,0) AS s, IFNULL(va.iv,0) AS iv, IFNULL(pa.t,0) AS t, IFNULL(pa.ip,0) AS ip, IFNULL(pa.r,0) AS r
FROM va FULL OUTER JOIN pa USING (wk, cat) ORDER BY w, c`; }
function sqlMonthly(a, b){ return `
SELECT EXTRACT(MONTH FROM PARSE_DATE('%Y%m%d', event_date)) AS m,
  IFNULL(NULLIF(TRIM(i.item_category), ''), '(not set)') AS c,
  COUNT(DISTINCT ${SID}) AS s
FROM ${TBL}, UNNEST(items) AS i
WHERE event_name = 'view_item' AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}'
GROUP BY m, c ORDER BY m, c`; }
function sqlDailyFocus(a, b){ const fc = focusCase(); return `
WITH v AS (
  SELECT PARSE_DATE('%Y%m%d', event_date) AS d, ${fc} AS k, ${SID} AS sid
  FROM ${TBL}, UNNEST(items) AS i
  WHERE event_name = 'view_item' AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}'),
p AS (
  SELECT PARSE_DATE('%Y%m%d', event_date) AS d, ${fc} AS k,
    ecommerce.transaction_id AS tid, IFNULL(i.quantity, 1) AS q, IFNULL(i.item_revenue, 0) AS rev
  FROM ${TBL}, UNNEST(items) AS i
  WHERE event_name = 'purchase' AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}'),
va AS (SELECT d, k, COUNT(DISTINCT sid) AS s FROM v WHERE k IS NOT NULL GROUP BY d, k),
pa AS (SELECT d, k, COUNT(DISTINCT tid) AS t, SUM(q) AS ip, ROUND(SUM(rev), 2) AS r FROM p WHERE k IS NOT NULL GROUP BY d, k)
SELECT FORMAT_DATE('%Y-%m-%d', COALESCE(va.d, pa.d)) AS d, COALESCE(va.k, pa.k) AS k,
  IFNULL(va.s,0) AS s, IFNULL(pa.t,0) AS t, IFNULL(pa.ip,0) AS ip, IFNULL(pa.r,0) AS r
FROM va FULL OUTER JOIN pa USING (d, k) ORDER BY d, k`; }
function sqlItems(a, b, curStart){ const fc = focusCase(); return `
WITH v AS (
  SELECT IF(PARSE_DATE('%Y%m%d', event_date) >= DATE '${curStart}', 'cur', 'prev') AS pd,
    TRIM(i.item_name) AS nm, ${SID} AS sid
  FROM ${TBL}, UNNEST(items) AS i
  WHERE event_name = 'view_item' AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}'
    AND i.item_name IS NOT NULL AND TRIM(i.item_name) != ''),
p AS (
  SELECT IF(PARSE_DATE('%Y%m%d', event_date) >= DATE '${curStart}', 'cur', 'prev') AS pd,
    TRIM(i.item_name) AS nm, ecommerce.transaction_id AS tid, IFNULL(i.quantity, 1) AS q, IFNULL(i.item_revenue, 0) AS rev
  FROM ${TBL}, UNNEST(items) AS i
  WHERE event_name = 'purchase' AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}'
    AND i.item_name IS NOT NULL AND TRIM(i.item_name) != ''),
attrs AS (
  SELECT TRIM(i.item_name) AS nm,
    APPROX_TOP_COUNT(i.item_id, 1)[OFFSET(0)].value AS id,
    APPROX_TOP_COUNT(IFNULL(NULLIF(TRIM(i.item_category), ''), '(not set)'), 1)[OFFSET(0)].value AS c,
    APPROX_TOP_COUNT(IFNULL(NULLIF(TRIM(i.item_category2), ''), '(not set)'), 1)[OFFSET(0)].value AS c2,
    APPROX_TOP_COUNT(NULLIF(TRIM(i.item_brand), ''), 1)[OFFSET(0)].value AS b,
    APPROX_TOP_COUNT(${fc}, 1)[OFFSET(0)].value AS k
  FROM ${TBL}, UNNEST(items) AS i
  WHERE event_name IN ('view_item', 'purchase') AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}'
    AND i.item_name IS NOT NULL AND TRIM(i.item_name) != '' GROUP BY nm),
va AS (SELECT pd, nm, COUNT(DISTINCT sid) AS s FROM v GROUP BY pd, nm),
pa AS (SELECT pd, nm, COUNT(DISTINCT tid) AS t, SUM(q) AS ip, ROUND(SUM(rev), 2) AS r FROM p GROUP BY pd, nm)
SELECT COALESCE(va.pd, pa.pd) AS pd, COALESCE(va.nm, pa.nm) AS nm,
  IFNULL(va.s,0) AS s, IFNULL(pa.t,0) AS t, IFNULL(pa.ip,0) AS ip, IFNULL(pa.r,0) AS r,
  attrs.id, attrs.c, attrs.c2, attrs.b, attrs.k
FROM va FULL OUTER JOIN pa USING (pd, nm)
LEFT JOIN attrs ON attrs.nm = COALESCE(va.nm, pa.nm)`; }
function sqlBreakdown(a, b){ const fc = focusCase(); return `
SELECT FORMAT_DATE('%Y-%m-%d', PARSE_DATE('%Y%m%d', event_date)) AS d, ${fc} AS k,
  IFNULL(NULLIF(TRIM(i.item_brand), ''), SPLIT(TRIM(i.item_name), ' ')[SAFE_OFFSET(0)]) AS rg,
  IFNULL(NULLIF(TRIM(i.item_category2), ''), '(not set)') AS c2,
  ROUND(SUM(IFNULL(i.item_revenue, 0)), 2) AS r
FROM ${TBL}, UNNEST(items) AS i
WHERE event_name = 'purchase' AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}' AND ${fc} IS NOT NULL
GROUP BY d, k, rg, c2 HAVING r > 0 ORDER BY d`; }
function sqlChannels(a, b){ return `
WITH s AS (
  SELECT PARSE_DATE('%Y%m%d', event_date) AS d,
    IFNULL(session_traffic_source_last_click.cross_channel_campaign.default_channel_group, 'Unassigned') AS ch, ${SID} AS sid
  FROM ${TBL}
  WHERE event_name = 'session_start' AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}'),
p AS (
  SELECT PARSE_DATE('%Y%m%d', event_date) AS d,
    IFNULL(session_traffic_source_last_click.cross_channel_campaign.default_channel_group, 'Unassigned') AS ch,
    ecommerce.transaction_id AS tid, IFNULL(ecommerce.purchase_revenue, 0) AS rev
  FROM ${TBL}
  WHERE event_name = 'purchase' AND _TABLE_SUFFIX BETWEEN '${a}' AND '${b}'),
sa AS (SELECT d, ch, COUNT(DISTINCT sid) AS s FROM s GROUP BY d, ch),
pa AS (SELECT d, ch, COUNT(DISTINCT tid) AS t, ROUND(SUM(rev), 2) AS r FROM p GROUP BY d, ch)
SELECT FORMAT_DATE('%Y-%m-%d', COALESCE(sa.d, pa.d)) AS d, COALESCE(sa.ch, pa.ch) AS ch,
  IFNULL(sa.s,0) AS s, IFNULL(pa.t,0) AS t, IFNULL(pa.r,0) AS r
FROM sa FULL OUTER JOIN pa USING (d, ch) ORDER BY d, ch`; }

/* ============================== period + live data loading ============================== */
let D = {};
const TABS = [];
const cache = {};
const rendered = {};
let curPeriod = null;
let activeTab = null;

function setPeriod(from, to){
  const lenDays = Math.round((parseD(to) - parseD(from)) / 86400000) + 1;
  const prev_end = addD(from, -1);
  const prev_start = addD(from, -lenDays);
  curPeriod = {
    from, to, prev_start, prev_end, lenDays,
    weeklyStart: mondayStr(minD(prev_start, addD(to, -7 * TREND_WEEKS))),
    focusStart: minD(prev_start, addD(to, -7 * FOCUS_WEEKS)),
    monthlyStart: addD(to, -MONTHLY_DAYS),
  };
  D.meta = {
    cur_start: from, cur_end: to, prev_start, prev_end,
    cur_weeks: weeksBetween(from, to), prev_weeks: weeksBetween(prev_start, prev_end),
    focus: FOCUS_LABELS, generated: "live",
  };
  for (const k in cache) delete cache[k];
  for (const k in rendered) delete rendered[k];
  document.getElementById("metaLine").textContent =
    from + " – " + to + "  vs  " + prev_start + " – " + prev_end + "  ·  live  ·  " + (signedInEmail || "");
}

const LOADERS = {
  weekly_category: () => bq(sqlWeekly("item_category", sfx(curPeriod.weeklyStart), sfx(curPeriod.to))),
  weekly_subcategory: async () => {
    const rows = await bq(sqlWeekly("item_category2", sfx(curPeriod.weeklyStart), sfx(curPeriod.to)));
    const tot = {}; rows.forEach(r => tot[r.c] = (tot[r.c] || 0) + (r.r || 0));
    const keep = new Set(Object.entries(tot).sort((a, b) => b[1] - a[1]).slice(0, 40).map(x => x[0]));
    const agg = {};
    rows.forEach(r => {
      const c = keep.has(r.c) ? r.c : "Other";
      const key = r.w + "|" + c;
      const a = agg[key] || (agg[key] = {w: r.w, c, s: 0, iv: 0, t: 0, ip: 0, r: 0});
      a.s += r.s; a.iv += r.iv; a.t += r.t; a.ip += r.ip; a.r += (r.r || 0);
    });
    return Object.values(agg).map(a => ({...a, r: Math.round(a.r * 100) / 100}));
  },
  monthly_category: () => bq(sqlMonthly(sfx(curPeriod.monthlyStart), sfx(curPeriod.to))),
  daily_focus: () => bq(sqlDailyFocus(sfx(curPeriod.focusStart), sfx(curPeriod.to))),
  focus_breakdown: () => bq(sqlBreakdown(sfx(curPeriod.from), sfx(curPeriod.to))),
  channels: () => bq(sqlChannels(sfx(curPeriod.prev_start), sfx(curPeriod.to))),
  items_wow: async () => {
    const rows = await bq(sqlItems(sfx(curPeriod.prev_start), sfx(curPeriod.to), curPeriod.from));
    const items = {};
    rows.forEach(r => {
      const it = items[r.nm] || (items[r.nm] = {n: r.nm, id: r.id, c: r.c, c2: r.c2, b: r.b, k: r.k,
        s: 0, t: 0, ip: 0, r: 0, s_p: 0, t_p: 0, ip_p: 0, r_p: 0});
      const sk = r.pd === "cur" ? "" : "_p";
      it["s" + sk] = r.s; it["t" + sk] = r.t; it["ip" + sk] = r.ip; it["r" + sk] = Math.round((r.r || 0) * 100) / 100;
      ["id","c","c2","b","k"].forEach(f => { if (!it[f] && r[f]) it[f] = r[f]; });
    });
    return Object.values(items)
      .filter(x => x.s > 0 || x.r > 0 || x.r_p > 0)
      .sort((a, b) => (b.s - a.s) || (b.r - a.r))
      .slice(0, 1500);
  },
};

const NEEDS = {
  cat: ["weekly_category", "monthly_category"],
  sub: ["weekly_subcategory"],
  items: ["items_wow"],
  detail: ["items_wow", "channels"],
};
function needsFor(id){ return id.indexOf("f_") === 0 ? ["daily_focus", "items_wow", "focus_breakdown"] : (NEEDS[id] || []); }
async function ensureData(id){
  const missing = needsFor(id).filter(n => !cache[n]);
  await Promise.all(missing.map(async n => { cache[n] = await LOADERS[n](); }));
  needsFor(id).forEach(n => D[n] = cache[n]);
}

/* ============================== app shell ============================== */
function periodFromControls(){
  const v = document.getElementById("preset").value;
  if (v === "custom") {
    const f = document.getElementById("fromD").value, t = document.getElementById("toD").value;
    if (f && t && f <= t) return [f, t];
    const w = lastFullWeek(); return [w.from, w.to];
  }
  if (v === "w4")  { const p = lastNWeeks(4);  return [p.from, p.to]; }
  if (v === "w13") { const p = lastNWeeks(13); return [p.from, p.to]; }
  if (v === "w26") { const p = lastNWeeks(26); return [p.from, p.to]; }
  const p = lastFullWeek(); return [p.from, p.to];
}
function wireControls(){
  const preset = document.getElementById("preset");
  const custom = document.getElementById("customWrap");
  const syncVis = () => { custom.style.display = preset.value === "custom" ? "flex" : "none"; };
  preset.onchange = () => { syncVis(); if (preset.value !== "custom") applyControls(); };
  document.getElementById("applyBtn").onclick = applyControls;
  document.getElementById("refreshBtn").onclick = () => {
    for (const k in cache) delete cache[k];
    for (const k in rendered) delete rendered[k];
    show(activeTab || TABS[0].id);
  };
  document.getElementById("signoutBtn").onclick = signOut;
  document.getElementById("fromD").value = curPeriod.from;
  document.getElementById("toD").value = curPeriod.to;
  syncVis();
}
function applyControls(){
  setPeriod(...periodFromControls());
  document.getElementById("fromD").value = curPeriod.from;
  document.getElementById("toD").value = curPeriod.to;
  show(activeTab || TABS[0].id);
}
function buildApp(){
  setPeriod(...periodFromControls());
  TABS.length = 0;
  TABS.push({id: "cat", label: "Category Summary (Weekly)", render: renderCategory});
  TABS.push({id: "sub", label: "Sub-Category Summary (Weekly)", render: renderSubcategory});
  for (const [k, label] of Object.entries(D.meta.focus))
    TABS.push({id: "f_" + k, label: label + " Sales", render: () => renderFocus(k, label)});
  TABS.push({id: "items", label: "Item Ranges & Item Sales", render: renderItems});
  TABS.push({id: "detail", label: "Item Detail & Channels", render: renderDetail});
  const nav = document.getElementById("nav");
  nav.innerHTML = TABS.map(t => `<button data-t="${t.id}">${t.label}</button>`).join("");
  nav.onclick = e => { const b = e.target.closest("button"); if (b) show(b.dataset.t); };
  document.getElementById("main").innerHTML =
    TABS.map(t => `<section class="tabpage" id="pg_${t.id}"></section>`).join("");
  wireControls();
  show(TABS[0].id);
}

async function show(id){
  activeTab = id;
  document.querySelectorAll("nav button").forEach(b => b.classList.toggle("on", b.dataset.t === id));
  document.querySelectorAll(".tabpage").forEach(p => p.classList.toggle("on", p.id === "pg_" + id));
  if (rendered[id]) return;
  const pg = document.getElementById("pg_" + id);
  pg.innerHTML = `<div class="loading">Querying BigQuery…</div>`;
  try {
    await ensureData(id);
    TABS.find(t => t.id === id).render();
    rendered[id] = true;
  } catch (e) {
    pg.innerHTML = `<div class="loading">Query failed.<br><small>${(e && e.message) || e}</small></div>`;
  }
}

/* ============================== shared builders ============================== */
function kpiRow(items){
  return `<div class="kpis">` + items.map(k =>
    `<div class="kpi"><div class="l">${k.l}</div><div class="v">${k.v}</div><div class="d">${k.d || ""}</div></div>`).join("") + `</div>`;
}

function weeklyKpis(rows){
  const cw = D.meta.cur_weeks, pw = D.meta.prev_weeks;
  const cur = rows.filter(r => cw.includes(r.w)), prev = rows.filter(r => pw.includes(r.w));
  const m = a => ({s: sum(a, r => r.s), t: sum(a, r => r.t), ip: sum(a, r => r.ip), r: sum(a, r => r.r), iv: sum(a, r => r.iv)});
  const c = m(cur), p = m(prev);
  const cvr = c.s ? c.t/c.s : 0, pcvr = p.s ? p.t/p.s : 0;
  const aov = c.t ? c.r/c.t : 0, paov = p.t ? p.r/p.t : 0;
  return kpiRow([
    {l:"Sessions (item viewed)", v:num(c.s), d:dl(c.s, p.s)},
    {l:"Items purchased", v:num(c.ip), d:dl(c.ip, p.ip)},
    {l:"Transactions", v:num(c.t), d:dl(c.t, p.t)},
    {l:"Purchase conversion", v:pct(cvr), d:dl(cvr, pcvr)},
    {l:"Item revenue", v:gbp(c.r), d:dl(c.r, p.r)},
    {l:"AOV", v:gbp(aov), d:dl(aov, paov)},
  ]);
}

// weekly 100% stacked bar of metric by dimension
function stacked100(canvasId, rows, metric, topN){
  const byC = groupBy(rows, r => r.c);
  const tops = Object.entries(byC).map(([c, a]) => [c, sum(a, r => r[metric])])
    .sort((a, b) => b[1] - a[1]).slice(0, topN).map(x => x[0]);
  const weeks = [...new Set(rows.map(r => r.w))].sort();
  const lookup = {};
  rows.forEach(r => lookup[r.w + "|" + r.c] = (lookup[r.w + "|" + r.c] || 0) + r[metric]);
  const totals = weeks.map(w => tops.reduce((a, c) => a + (lookup[w + "|" + c] || 0), 0));
  const ds = tops.map((c, i) => ({
    label: c, backgroundColor: col(i),
    data: weeks.map((w, wi) => totals[wi] ? 100 * (lookup[w + "|" + c] || 0) / totals[wi] : 0),
  }));
  draw(canvasId, {type:"bar", data:{labels: weeks.map(monthLbl), datasets: ds},
    options:{responsive:true, maintainAspectRatio:false,
      scales:{x:{stacked:true, ticks:{maxTicksLimit:18, maxRotation:45}}, y:{stacked:true, max:100, ticks:{callback:v => v + "%"}}},
      plugins:{legend:{position:"top", labels:{boxWidth:11}},
        tooltip:{callbacks:{label: c => `${c.dataset.label}: ${c.parsed.y.toFixed(1)}%`}}}}});
}

function weeklyLines(canvasId, rows, metric, topN, fmt){
  const byC = groupBy(rows, r => r.c);
  const tops = Object.entries(byC).map(([c, a]) => [c, sum(a, r => r.r)])
    .sort((a, b) => b[1] - a[1]).slice(0, topN).map(x => x[0]);
  const weeks = [...new Set(rows.map(r => r.w))].sort();
  const lookup = {};
  rows.forEach(r => lookup[r.w + "|" + r.c] = r);
  const ds = tops.map((c, i) => ({
    label: c, borderColor: col(i), backgroundColor: col(i), borderWidth: 1.8, pointRadius: 0, tension: .25,
    data: weeks.map(w => {
      const r = lookup[w + "|" + c];
      if (!r) return 0;
      if (metric === "cvr") return r.s ? 100 * r.t / r.s : 0;
      return r[metric];
    }),
  }));
  draw(canvasId, {type:"line", data:{labels: weeks.map(monthLbl), datasets: ds},
    options:{responsive:true, maintainAspectRatio:false, interaction:{mode:"index", intersect:false},
      scales:{x:{ticks:{maxTicksLimit:18, maxRotation:45}}, y:{ticks:{callback: fmt}}},
      plugins:{legend:{position:"top", labels:{boxWidth:11}}}}});
}

// KPI table with WoW deltas + heatmap, for category/subcategory summaries
function kpiTable(rows, dimLabel){
  const cw = D.meta.cur_weeks, pw = D.meta.prev_weeks;
  const aggByCat = arr => { const m = {}; arr.forEach(r => { const o = m[r.c] || (m[r.c] = {s:0, iv:0, t:0, ip:0, r:0}); o.s += r.s; o.iv += r.iv; o.t += r.t; o.ip += r.ip; o.r += (r.r || 0); }); return m; };
  const cur = aggByCat(rows.filter(r => cw.includes(r.w)));
  const prev = aggByCat(rows.filter(r => pw.includes(r.w)));
  const cats = Object.keys(cur).map(c => {
    const a = cur[c], b = prev[c] || {};
    return {c, s:a.s, t:a.t, ip:a.ip, r:a.r, cvr: a.s ? a.t/a.s : 0, aov: a.t ? a.r/a.t : 0,
            s_p:b.s||0, t_p:b.t||0, r_p:b.r||0, cvr_p: b.s ? b.t/b.s : 0, aov_p: b.t ? b.r/b.t : 0};
  }).sort((a, b) => b.r - a.r);
  const totR = sum(cats, x => x.r);
  const mx = f => Math.max(...cats.map(x => x[f]), 1);
  const M = {s:mx("s"), t:mx("t"), cvr:mx("cvr"), r:mx("r"), aov:mx("aov")};
  let html = `<table><thead><tr><th>${dimLabel}</th><th>Sessions</th><th></th><th>Trans.</th><th></th>
    <th>CVR</th><th></th><th>Revenue</th><th></th><th>Rev. share</th><th>AOV</th><th></th></tr></thead><tbody>`;
  for (const x of cats) {
    html += `<tr><td class="name">${x.c}</td>
      <td style="${heat(x.s, M.s, 210)}">${num(x.s)}</td><td>${dl(x.s, x.s_p)}</td>
      <td style="${heat(x.t, M.t, 175)}">${num(x.t)}</td><td>${dl(x.t, x.t_p)}</td>
      <td style="${heat(x.cvr, M.cvr, 320)}">${pct(x.cvr)}</td><td>${dl(x.cvr, x.cvr_p)}</td>
      <td style="${heat(x.r, M.r, 28)}">${gbp(x.r)}</td><td>${dl(x.r, x.r_p)}</td>
      <td>${totR ? (100*x.r/totR).toFixed(1) : 0}%</td>
      <td style="${heat(x.aov, M.aov, 95)}">${gbp(x.aov)}</td><td>${dl(x.aov, x.aov_p)}</td></tr>`;
  }
  const t = {s:sum(cats,x=>x.s), t:sum(cats,x=>x.t), r:totR,
             s_p:sum(cats,x=>x.s_p), t_p:sum(cats,x=>x.t_p), r_p:sum(cats,x=>x.r_p)};
  html += `<tr class="total"><td>Grand total</td><td>${num(t.s)}</td><td>${dl(t.s,t.s_p)}</td>
    <td>${num(t.t)}</td><td>${dl(t.t,t.t_p)}</td>
    <td>${t.s?pct(t.t/t.s):"-"}</td><td>${dl(t.s?t.t/t.s:0, t.s_p?t.t_p/t.s_p:0)}</td>
    <td>${gbp(t.r)}</td><td>${dl(t.r,t.r_p)}</td><td>100%</td>
    <td>${t.t?gbp(t.r/t.t):"-"}</td><td></td></tr></tbody></table>`;
  return html;
}

/* ============================== focus tabs ============================== */
function yoyLine(canvasId, daily, field, fmt, agg){
  // aggregate to weekly for readability; overlay same weeks last year (shift 364d)
  const byW = {};
  daily.forEach(r => {
    const d = new Date(r.d + "T00:00:00");
    const mon = new Date(d); mon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
    const w = mon.toISOString().slice(0, 10);
    byW[w] = byW[w] || {s:0, t:0, r:0, ip:0};
    byW[w].s += r.s; byW[w].t += r.t; byW[w].r += r.r; byW[w].ip += r.ip;
  });
  const weeks = Object.keys(byW).sort();
  const val = w => {
    const x = byW[w]; if (!x) return null;
    return field === "cvr" ? (x.s ? 100 * x.t / x.s : 0) : x[field];
  };
  const start = weeks.length > 56 ? weeks.slice(-56) : weeks; // show last ~13 months
  const ly = w => { const d = new Date(w + "T00:00:00"); d.setDate(d.getDate() - 364); return d.toISOString().slice(0, 10); };
  draw(canvasId, {type:"line",
    data:{labels: start.map(monthLbl), datasets:[
      {label:"This year", data: start.map(val), borderColor:"#1f3d33", backgroundColor:"#1f3d33", borderWidth:2, pointRadius:0, tension:.25},
      {label:"Previous year", data: start.map(w => val(ly(w))), borderColor:"#b0a893", backgroundColor:"#b0a893", borderWidth:1.5, borderDash:[5,4], pointRadius:0, tension:.25},
    ]},
    options:{responsive:true, maintainAspectRatio:false, interaction:{mode:"index", intersect:false},
      scales:{x:{ticks:{maxTicksLimit:14}}, y:{ticks:{callback: fmt}}},
      plugins:{legend:{position:"top", labels:{boxWidth:11}}}}});
}

function stackedDaily(canvasId, rows, dimField){
  const tops = Object.entries(groupBy(rows, r => r[dimField])).map(([c, a]) => [c, sum(a, r => r.r)])
    .sort((a, b) => b[1] - a[1]).slice(0, 10).map(x => x[0]);
  const days = [...new Set(rows.map(r => r.d))].sort();
  const lk = {};
  rows.forEach(r => {
    const key = r.d + "|" + (tops.includes(r[dimField]) ? r[dimField] : "Other");
    lk[key] = (lk[key] || 0) + r.r;
  });
  const dims = tops.concat(rows.some(r => !tops.includes(r[dimField])) ? ["Other"] : []);
  draw(canvasId, {type:"bar",
    data:{labels: days.map(shortDate), datasets: dims.map((c, i) => ({label: c,
      backgroundColor: c === "Other" ? "#cfc9bb" : col(i), data: days.map(d => lk[d + "|" + c] || 0)}))},
    options:{responsive:true, maintainAspectRatio:false,
      scales:{x:{stacked:true, ticks:{maxTicksLimit:14, maxRotation:45}}, y:{stacked:true, ticks:{callback:v => "£" + (v/1000).toFixed(0) + "k"}}},
      plugins:{legend:{position:"top", labels:{boxWidth:11}},
        tooltip:{callbacks:{label: c => `${c.dataset.label}: ${gbp(c.parsed.y)}`}}}}});
}

function renderFocus(k, label){
  const pg = document.getElementById("pg_f_" + k);
  const daily = D.daily_focus.filter(r => r.k === k);
  const cs = D.meta.cur_start, ce = D.meta.cur_end, ps = D.meta.prev_start;
  const inRange = (d, a, b) => d >= a && d <= b;
  const cur = daily.filter(r => inRange(r.d, cs, ce));
  const prev = daily.filter(r => inRange(r.d, ps, cs) && r.d < cs);
  const m = a => ({s:sum(a,r=>r.s), t:sum(a,r=>r.t), ip:sum(a,r=>r.ip), r:sum(a,r=>r.r)});
  const c = m(cur), p = m(prev);
  const items = D.items_wow.filter(r => r.k === k && (r.r > 0 || r.s > 100))
    .sort((a, b) => b.r - a.r).slice(0, 25);
  const mxR = Math.max(...items.map(x => x.r), 1), mxS = Math.max(...items.map(x => x.s), 1);
  pg.innerHTML = kpiRow([
    {l:"Sessions", v:num(c.s), d:dl(c.s, p.s)},
    {l:"Items purchased", v:num(c.ip), d:dl(c.ip, p.ip)},
    {l:"Transactions", v:num(c.t), d:dl(c.t, p.t)},
    {l:"Purchase conversion", v:c.s?pct(c.t/c.s):"-", d:dl(c.s?c.t/c.s:0, p.s?p.t/p.s:0)},
    {l:"Item revenue", v:gbp(c.r), d:dl(c.r, p.r)},
    {l:"AOV", v:c.t?gbp(c.r/c.t):"-", d:dl(c.t?c.r/c.t:0, p.t?p.r/p.t:0)},
  ]) + `
    <div class="card"><h2>${label} — item detail, last week <span class="sub">top 25 by revenue, WoW deltas</span></h2>
      <div class="body" style="overflow-x:auto"><table><thead><tr>
        <th>Item name</th><th>Revenue</th><th></th><th>Sessions</th><th></th>
        <th>Transactions</th><th>Items purchased</th><th>CVR</th></tr></thead><tbody>` +
    items.map(x => `<tr><td class="name" title="${x.n}">${x.n}</td>
      <td style="${heat(x.r, mxR, 28)}">${gbp(x.r)}</td><td>${dl(x.r, x.r_p)}</td>
      <td style="${heat(x.s, mxS, 210)}">${num(x.s)}</td><td>${dl(x.s, x.s_p)}</td>
      <td>${num(x.t)}</td><td>${num(x.ip)}</td><td>${x.s ? pct(x.t/x.s) : "-"}</td></tr>`).join("") +
    `</tbody></table></div></div>
    <div class="card"><h2>Revenue vs last year <span class="sub">weekly</span></h2>
      <div class="body chartbox"><canvas id="cf_r_${k}"></canvas></div></div>
    <div class="twocol">
      <div class="card"><h2>Revenue by range <span class="sub">daily, last 28 days</span></h2>
        <div class="body chartbox"><canvas id="cf_rg_${k}"></canvas></div></div>
      <div class="card"><h2>Revenue by item type <span class="sub">daily, last 28 days</span></h2>
        <div class="body chartbox"><canvas id="cf_ty_${k}"></canvas></div></div>
    </div>
    <div class="card"><h2>Sessions vs last year <span class="sub">weekly</span></h2>
      <div class="body chartbox"><canvas id="cf_s_${k}"></canvas></div></div>
    <div class="card"><h2>Conversion rate vs last year <span class="sub">weekly</span></h2>
      <div class="body chartbox"><canvas id="cf_c_${k}"></canvas></div></div>`;
  yoyLine("cf_r_" + k, daily, "r", v => "£" + (v/1000).toFixed(0) + "k");
  yoyLine("cf_s_" + k, daily, "s", v => (v/1000).toFixed(1) + "k");
  yoyLine("cf_c_" + k, daily, "cvr", v => v.toFixed(2) + "%");
  const bd = D.focus_breakdown.filter(r => r.k === k);
  stackedDaily("cf_rg_" + k, bd, "rg");
  stackedDaily("cf_ty_" + k, bd, "c2");
}

/* ============================== tab: items WoW ============================== */
const itemsState = {sort:"s", dir:-1, page:0, q:"", cat:"", per:50};
function renderItems(){
  const pg = document.getElementById("pg_items");
  const cats = [...new Set(D.items_wow.map(r => r.c).filter(Boolean))].sort();
  pg.innerHTML = `
    <div class="controls">
      <input type="search" id="itQ" placeholder="Search item name…">
      <label>Category</label>
      <select id="itC"><option value="">All categories</option>${cats.map(c => `<option>${c}</option>`).join("")}</select>
      <button class="btn" id="itCsv">Export CSV</button>
    </div>
    <div class="card"><h2>Item detail — week on week <span class="sub">last full week vs prior; click headers to sort</span></h2>
      <div class="body" style="overflow-x:auto" id="itTable"></div>
      <div class="pager"><span id="itInfo"></span>
        <button class="btn" id="itPrev">‹</button><button class="btn" id="itNext">›</button></div>
    </div>`;
  document.getElementById("itQ").oninput = e => { itemsState.q = e.target.value.toLowerCase(); itemsState.page = 0; drawItems(); };
  document.getElementById("itC").onchange = e => { itemsState.cat = e.target.value; itemsState.page = 0; drawItems(); };
  document.getElementById("itPrev").onclick = () => { if (itemsState.page > 0) { itemsState.page--; drawItems(); } };
  document.getElementById("itNext").onclick = () => { itemsState.page++; drawItems(); };
  document.getElementById("itCsv").onclick = () => exportCsv(filteredItems(),
    ["n","c","c2","r","r_p","s","s_p","t","t_p","ip","ip_p"],
    ["Item name","Category","Sub-category","Revenue","Revenue prev","Sessions","Sessions prev","Transactions","Transactions prev","Items purchased","Items purchased prev"],
    "items_wow.csv");
  drawItems();
}
function filteredItems(){
  let rows = D.items_wow;
  if (itemsState.q) rows = rows.filter(r => r.n.toLowerCase().includes(itemsState.q));
  if (itemsState.cat) rows = rows.filter(r => r.c === itemsState.cat);
  const f = itemsState.sort;
  return [...rows].sort((a, b) => itemsState.dir * ((a[f] || 0) > (b[f] || 0) ? 1 : -1));
}
function drawItems(){
  const rows = filteredItems();
  const pageMax = Math.max(0, Math.ceil(rows.length / itemsState.per) - 1);
  itemsState.page = Math.min(itemsState.page, pageMax);
  const slice = rows.slice(itemsState.page * itemsState.per, (itemsState.page + 1) * itemsState.per);
  const mxR = Math.max(...rows.map(x => x.r), 1), mxS = Math.max(...rows.map(x => x.s), 1);
  const H = (f, lbl) => `<th data-f="${f}" class="${itemsState.sort===f?"sorton":""}">${lbl}${itemsState.sort===f?(itemsState.dir<0?" ↓":" ↑"):""}</th>`;
  document.getElementById("itTable").innerHTML = `<table><thead><tr>
    <th style="text-align:right">#</th>${H("c","Category")}${H("n","Item name")}
    ${H("r","Revenue")}<th></th>${H("s","Sessions")}<th></th>${H("t","Trans.")}<th></th>${H("ip","Items")}<th></th></tr></thead><tbody>` +
    slice.map((x, i) => `<tr>
      <td>${itemsState.page * itemsState.per + i + 1}.</td>
      <td style="text-align:left;color:var(--ink-soft);font-size:11px">${x.c || "-"}</td>
      <td class="name" title="${x.n}">${x.n}</td>
      <td style="${heat(x.r, mxR, 28)}">${gbp(x.r)}</td><td>${dl(x.r, x.r_p)}</td>
      <td style="${heat(x.s, mxS, 175)}">${num(x.s)}</td><td>${dl(x.s, x.s_p)}</td>
      <td>${num(x.t)}</td><td>${dl(x.t, x.t_p)}</td>
      <td>${num(x.ip)}</td><td>${dl(x.ip, x.ip_p)}</td></tr>`).join("") +
    `<tr class="total"><td></td><td></td><td>Total (filtered)</td>
      <td>${gbp(sum(rows, x => x.r))}</td><td>${dl(sum(rows,x=>x.r), sum(rows,x=>x.r_p))}</td>
      <td>${num(sum(rows, x => x.s))}</td><td>${dl(sum(rows,x=>x.s), sum(rows,x=>x.s_p))}</td>
      <td>${num(sum(rows, x => x.t))}</td><td>${dl(sum(rows,x=>x.t), sum(rows,x=>x.t_p))}</td>
      <td>${num(sum(rows, x => x.ip))}</td><td>${dl(sum(rows,x=>x.ip), sum(rows,x=>x.ip_p))}</td></tr>
    </tbody></table>`;
  document.getElementById("itInfo").textContent =
    `${itemsState.page * itemsState.per + 1}–${Math.min(rows.length, (itemsState.page + 1) * itemsState.per)} of ${rows.length}`;
  document.querySelectorAll("#itTable th[data-f]").forEach(th => th.onclick = () => {
    const f = th.dataset.f;
    if (itemsState.sort === f) itemsState.dir *= -1; else { itemsState.sort = f; itemsState.dir = -1; }
    drawItems();
  });
}

/* ============================== tab: item detail + channels ============================== */
const detState = {sort:"r", dir:-1, page:0, q:"", per:50};
function renderDetail(){
  const pg = document.getElementById("pg_detail");
  pg.innerHTML = `
    <div class="controls">
      <input type="search" id="dtQ" placeholder="Search item name or ID…">
      <button class="btn" id="dtCsv">Export CSV</button>
    </div>
    <div class="card"><h2>Item detail — last week <span class="sub">with item IDs</span></h2>
      <div class="body" style="overflow-x:auto" id="dtTable"></div>
      <div class="pager"><span id="dtInfo"></span>
        <button class="btn" id="dtPrev">‹</button><button class="btn" id="dtNext">›</button></div>
    </div>
    <div class="card"><h2>Channel performance — last week <span class="sub">vs previous week, session default channel grouping</span></h2>
      <div class="body" style="overflow-x:auto" id="chTable"></div>
      <div class="note">Sessions here are all site sessions by channel (not item-scoped).</div></div>
    <div class="card"><h2>Revenue by channel <span class="sub">daily, last 14 days</span></h2>
      <div class="body chartbox"><canvas id="c_ch"></canvas></div></div>`;
  document.getElementById("dtQ").oninput = e => { detState.q = e.target.value.toLowerCase(); detState.page = 0; drawDetail(); };
  document.getElementById("dtPrev").onclick = () => { if (detState.page > 0) { detState.page--; drawDetail(); } };
  document.getElementById("dtNext").onclick = () => { detState.page++; drawDetail(); };
  document.getElementById("dtCsv").onclick = () => exportCsv(filteredDet(),
    ["n","id","c","c2","b","ip","r","t","s"],
    ["Item name","Item ID","Category","Sub-category","Brand","Items purchased","Revenue","Transactions","Sessions"],
    "item_detail.csv");
  drawDetail();
  drawChannels();
}
function filteredDet(){
  let rows = D.items_wow.filter(r => r.s > 0 || r.r > 0);
  if (detState.q) rows = rows.filter(r => r.n.toLowerCase().includes(detState.q) || (r.id || "").toLowerCase().includes(detState.q));
  const f = detState.sort;
  return [...rows].sort((a, b) => detState.dir * ((a[f] || 0) > (b[f] || 0) ? 1 : -1));
}
function drawDetail(){
  const rows = filteredDet();
  detState.page = Math.min(detState.page, Math.max(0, Math.ceil(rows.length / detState.per) - 1));
  const slice = rows.slice(detState.page * detState.per, (detState.page + 1) * detState.per);
  const H = (f, lbl) => `<th data-f="${f}" class="${detState.sort===f?"sorton":""}">${lbl}${detState.sort===f?(detState.dir<0?" ↓":" ↑"):""}</th>`;
  document.getElementById("dtTable").innerHTML = `<table><thead><tr>
    ${H("n","Item name")}<th>Item ID</th>${H("ip","Items purchased")}${H("r","Item revenue")}${H("t","Transactions")}${H("s","Sessions")}<th>CVR</th></tr></thead><tbody>` +
    slice.map(x => `<tr><td class="name" title="${x.n}">${x.n}</td>
      <td style="text-align:left;font-size:11px;color:var(--ink-soft)">${x.id || "-"}</td>
      <td>${num(x.ip)}</td><td>${gbp(x.r)}</td><td>${num(x.t)}</td><td>${num(x.s)}</td>
      <td>${x.s ? pct(x.t/x.s) : "-"}</td></tr>`).join("") + `</tbody></table>`;
  document.getElementById("dtInfo").textContent =
    `${detState.page * detState.per + 1}–${Math.min(rows.length, (detState.page + 1) * detState.per)} of ${rows.length}`;
  document.querySelectorAll("#dtTable th[data-f]").forEach(th => th.onclick = () => {
    const f = th.dataset.f;
    if (detState.sort === f) detState.dir *= -1; else { detState.sort = f; detState.dir = -1; }
    drawDetail();
  });
}
function drawChannels(){
  const rows = D.channels;
  const cs = D.meta.cur_start;
  const cur = groupBy(rows.filter(r => r.d >= cs), r => r.ch);
  const prev = groupBy(rows.filter(r => r.d < cs), r => r.ch);
  const chs = Object.keys({...cur, ...prev}).map(ch => {
    const a = cur[ch] || [], b = prev[ch] || [];
    const c = {ch, s:sum(a,r=>r.s), t:sum(a,r=>r.t), r:sum(a,r=>r.r),
               s_p:sum(b,r=>r.s), t_p:sum(b,r=>r.t), r_p:sum(b,r=>r.r)};
    c.cvr = c.s ? c.t/c.s : 0; c.cvr_p = c.s_p ? c.t_p/c.s_p : 0;
    return c;
  }).sort((a, b) => b.r - a.r);
  const mxR = Math.max(...chs.map(x => x.r), 1), mxS = Math.max(...chs.map(x => x.s), 1);
  document.getElementById("chTable").innerHTML = `<table><thead><tr>
    <th>Channel</th><th>Revenue</th><th></th><th>Sessions</th><th></th><th>Transactions</th><th></th><th>CVR</th><th></th></tr></thead><tbody>` +
    chs.map(x => `<tr><td class="name">${x.ch}</td>
      <td style="${heat(x.r, mxR, 28)}">${gbp(x.r)}</td><td>${dl(x.r, x.r_p)}</td>
      <td style="${heat(x.s, mxS, 210)}">${num(x.s)}</td><td>${dl(x.s, x.s_p)}</td>
      <td>${num(x.t)}</td><td>${dl(x.t, x.t_p)}</td>
      <td>${pct(x.cvr)}</td><td>${dl(x.cvr, x.cvr_p)}</td></tr>`).join("") + `</tbody></table>`;
  // daily stacked revenue by channel
  const days = [...new Set(rows.map(r => r.d))].sort();
  const tops = chs.slice(0, 8).map(x => x.ch);
  const lk = {}; rows.forEach(r => lk[r.d + "|" + r.ch] = r.r);
  draw("c_ch", {type:"bar",
    data:{labels: days.map(shortDate), datasets: tops.map((ch, i) => ({label: ch, backgroundColor: col(i),
      data: days.map(d => lk[d + "|" + ch] || 0)}))},
    options:{responsive:true, maintainAspectRatio:false,
      scales:{x:{stacked:true}, y:{stacked:true, ticks:{callback:v => "£" + (v/1000).toFixed(0) + "k"}}},
      plugins:{legend:{position:"top", labels:{boxWidth:11}},
        tooltip:{callbacks:{label: c => `${c.dataset.label}: ${gbp(c.parsed.y)}`}}}}});
}

/* ============================== csv export ============================== */
function exportCsv(rows, fields, headers, filename){
  const esc = v => { v = v == null ? "" : String(v); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
  const csv = [headers.join(",")].concat(rows.map(r => fields.map(f => esc(r[f])).join(","))).join("\n");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv"}));
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}
